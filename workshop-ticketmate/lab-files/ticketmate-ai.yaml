apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketmate-ai
  namespace: ${STUDENT_NAMESPACE}
  labels:
    app: ticketmate-ai
    app.kubernetes.io/name: ticketmate-ai
    app.kubernetes.io/part-of: ai-pods-ticketmate
    lab.splunk.com/student-id: ${STUDENT_ID}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticketmate-ai
  template:
    metadata:
      labels:
        app: ticketmate-ai
        app.kubernetes.io/name: ticketmate-ai
        app.kubernetes.io/part-of: ai-pods-ticketmate
        lab.splunk.com/student-id: ${STUDENT_ID}
    spec:
      containers:
        - name: ticketmate-ai
          image: ${TICKETMATE_IMAGE}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: NIM_BASE_URL
              value: ${NIM_BASE_URL}
            - name: NIM_MODEL
              value: ${NIM_MODEL}
            - name: NIM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ${NIM_API_KEY_SECRET}
                  key: api-key
                  optional: true
            - name: TICKETMATE_DISABLE_OPENAI_AGENT_TRACING
              value: "false"
            - name: OTEL_SERVICE_NAME
              value: ticketmate-ai
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://student-collector:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_INSTRUMENTATION_GENAI_EMITTERS
              value: span_metric
            - name: OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT
              value: SPAN_ONLY
            - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
              value: delta
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: student.id=${STUDENT_ID},department.name=${DEPARTMENT_NAME},chargeback.account=${CHARGEBACK_ACCOUNT},k8s.namespace.name=${STUDENT_NAMESPACE},deployment.environment=${STUDENT_ID},k8s.cluster.name=${LOGICAL_CLUSTER_NAME}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ticketmate-ai
  namespace: ${STUDENT_NAMESPACE}
  labels:
    app: ticketmate-ai
    app.kubernetes.io/name: ticketmate-ai
    app.kubernetes.io/part-of: ai-pods-ticketmate
    lab.splunk.com/student-id: ${STUDENT_ID}
spec:
  type: ClusterIP
  selector:
    app: ticketmate-ai
  ports:
    - name: http
      port: 8080
      targetPort: http
