site_name: CLUS-LTROBS-2001 Instructor Runbook
site_description: Instructor-only build, operate, validate, and destroy guide for the AI Pods GPU lab cluster
site_author: Cisco Live US 2026 Lab Team
copyright: Copyright &copy; 2026 Cisco
docs_dir: instructors
site_dir: site-instructors

repo_name: ai-pods

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.instant
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: Roboto Mono

nav:
  - Overview: index.md
  - Architecture: architecture.md
  - Prerequisites: prerequisites.md
  - Terraform Deploy: terraform-deploy.md
  - Platform Services: platform-services.md
  - Splunk Setup: splunk.md
  - Student Environments: student-environments.md
  - Validation: validation.md
  - Day-Of Operations: day-of-operations.md
  - Destroy: destroy.md
  - Troubleshooting: troubleshooting.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra:
  generator: false
  event_name: Cisco Live US 2026
  event_year: "2026"
  audience: Instructor

extra_css:
  - stylesheets/extra.css
